services:
  site:
    image: nginx:alpine
    container_name: fourseasonswaterfrontvillas_site
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8083:80"
    depends_on:
      - forms
    networks:
      - fourseasonswaterfrontvillas_net

  forms:
    build: ./form-handler
    container_name: fourseasonswaterfrontvillas_forms
    restart: unless-stopped
    env_file: .env
    networks:
      - fourseasonswaterfrontvillas_net

networks:
  fourseasonswaterfrontvillas_net:
    driver: bridge
