server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;  # mounted from ./public via docker-compose
    index index.html;

    location ~ /\.         { deny all; }
    location ~* \.(env|sql|log|bak)$ { deny all; }

    # Lazy DNS resolution — forms container may not be running without .env
    resolver 127.0.0.11 valid=30s;
    set $forms_upstream http://forms:3000;

    location /api/ {
        proxy_pass $forms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
